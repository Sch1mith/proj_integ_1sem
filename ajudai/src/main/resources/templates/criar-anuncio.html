<!DOCTYPE html>
<html xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org)" lang="pt-BR">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!--google fonts-->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Finlandica+Text:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
        <!--css padrãao-->
        <link rel="stylesheet" href="./css/utilities.css">
        <link rel="stylesheet" href="./css/criar-anuncio.css">
        <title>Ajudaí - criar anuncio</title>
    </head>

    <body>

        <!--essa tag é onde a header vai ser injetada pelo springboot-->
        <header th:replace="~{fragments :: header}"></header>

        <main class="conteudo">
            <h2 class="titulo-pagina">criar novo anúncio</h2>

            <form th:action="@{/produto}" enctype="multipart/form-data" class="layout-criar-anuncio">

                <section class="coluna-dados-anuncio">

                    <div class="form-grupo">
                        <label for="nomeItem">o que você está compartilhando? *</label>
                        <input type="text" id="nomeItem" name="nome" placeholder="Ex: Furadeira de impacto Bosch, Violão Tagima...">
                    </div>

                    <div class="form-grupo">
                        <label for="categoriaItem">categoria do item *</label>
                        <select id="categoriaItem" name="categoria">
                            <option value="" disabled selected>selecione uma categoria...</option>
                            <option value="FERRAMENTAS">ferramentas</option>
                            <option value="INSTRUMENTOS">instrumentos musicais</option>
                            <option value="ARTESANATO">equipamento de artesanato</option>
                            <option value="ELETRONICOS">eletrônicos</option>
                            <option value="OUTROS">outros</option>
                        </select>
                    </div>

                    <div class="form-grupo">
                        <label for="valorHora">valor por hora *</label>
                        <div class="input-preco-wrapper">
                            <span class="moeda-prefixo">R$</span>
                            <input type="number" id="valorHora" name="valorHora" step="0.01" min="0" placeholder="0,00">
                        </div>
                    </div>

                    <div class="form-grupo">
                        <label for="descricaoItem">descrição detalhada *</label>
                        <textarea id="descricaoItem" name="descricao" rows="6"
                                  placeholder="Conte detalhes sobre o estado do item, o que vem junto (cabos, chaves), regras de uso ou restrições..."></textarea>
                    </div>

                    <div class="acoes-formulario">
                        <button type="submit" class="c-btn btn-secundario btn-criar-anuncio">criar anúncio</button>
                        <button type="button" class="c-btn btn-cancelar-anuncio" th:onclick="|window.location.href='@{/}'|">cancelar</button>
                    </div>

                </section>

                <aside class="coluna-midia-anuncio">

                    <div class="form-grupo">
                        <label>fotos do produto *</label>

                        <label for="uploadFoto" class="zona-upload-card">
                            <input type="file" id="uploadFoto" name="foto" accept="image/*">
                            <div class="conteudo-zona-upload">
                                <span class="symbols">add_a_photo</span>
                                <strong>clique para selecionar a foto</strong>
                                <p>Formatos suportados: JPG, PNG</p>
                            </div>
                        </label>
                    </div>

                    <div class="box-dicas-anuncio">
                        <div class="dicas-titulo">
                            <span class="symbols">lightbulb</span>
                            <h3>dicas para um bom anúncio</h3>
                        </div>
                        <ul>
                            <li>tire fotos reais do seu item em um lugar bem iluminado.</li>
                            <li>seja honesto sobre o estado de conservação ou pequenas marcas de uso.</li>
                            <li>responda rápido às solicitações para manter sua reputação alta!</li>
                        </ul>
                    </div>

                </aside>

            </form>
        </main>

        <!--essa tage é onde o footer vai ser injetado pelo springboot-->
        <footer th:replace="~{fragments :: footer}"></footer>
        <script src="https://kit.fontawesome.com/2e9951a3e8.js" crossorigin="anonymous"></script>
        <script src="utilities.js"></script>
    </body>
</html>
