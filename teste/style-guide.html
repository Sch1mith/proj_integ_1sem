<!DOCTYPE html>
<html xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org)" lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <!--bootstrap-->
    <link rel="stylesheet" href="./bootstrap/css/bootstrap.min.css">
    <!--css padrãao-->
    <link rel="stylesheet" href="./utilities.css">
    <title>Ajudaí</title>
  </head>

  <body>

    <!--aqui vão ficar elementos padrão para usar no site-->
    <main style="margin-left: 1rem;">
      <section class="mb-5">
        <h3>Botões do Sistema</h3>
        <!-- botão principal -->
        <button id="#" data-item-id="123" th:attr="data-item-id=${#}" type="button" class="btn btn-primary c-button c-button--primary">
          Ação Principal
        </button>

        <!--variação do botão primario-->
        <button id="#" data-item-id="123" th:attr="data-item-id=${#}" type="button" class="btn btn-primary c-button c-button--primary-var">
          Ação Principal
        </button>

        <!-- botão secundário -->
        <button id="#" data-item-id="123" th:attr="data-item-id=${#}" type="button" class="btn btn-secundary c-button c-button--secondary">
          Cancelar
        </button>
        <hr>
        <h3>Campo de Texto</h3>

        <!--campo de texto simples-->
        <p  style="font-family: sans-serif;
                  color: indigo;
                  font-size: 1.2rem"> altere o valor em <code>col-md-6</code> para mudar a largura do campo
        </p>

        <div class="mb-3 col-md-6">
          <label for="input-item" class="form-label">nome do campo (Ex: login, nome do pedido, etc.)</label>
          <input type="text"
                 class="form-control c-input c-input--simple"
                 id="input-item"
                 placeholder="altere o texto que fica aqui"
                 name="nomedoinput">
        </div>

        <!--campo de texto grande-->
        <p style="font-family: sans-serif;
                  color: indigo;
                  font-size: 1.2rem">altere o valor em <code>col-md-8</code> para alterar a largura do item e altere o valor em
          <code>rows="3"</code> para alterar a altura
        </p>

        <div class="mb-3 col-md-8">
          <label class="form-label">nome do campo</label>
          <textarea class="form-control c-input c-input--textarea"
                    rows="3"
                    placeholder="altere o texto que fica aqui"
                    name="nomedoinput"></textarea>
        </div>

        <!--campo de busca-->
        <div class="mb-3 col-md-8">
          <div class="input-group">
            <span class="input-group-text" id="basic-addon1">🔍</span>
            <input type="text" class="form-control c-input c-input--pesquisa" placeholder="Buscar no Ajudaí...">
          </div>
        </div>

        <span class="material-symbols"">home</span>
      </section>
    </main>



    <script src="./bootstrap/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
